<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Add Inventory Item</title>
  <style>
    :root{--accent:#2b6cb0;--muted:#6b7280;--bg:#f6f8fb}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,Arial,Helvetica,sans-serif;background:var(--bg);color:#111}
    .container{max-width:820px;margin:36px auto;padding:22px;background:#fff;border-radius:10px;box-shadow:0 6px 18px rgba(16,24,40,0.06)}
    h1{margin:0 0 14px;font-size:20px}
    .form-group{display:flex;flex-direction:column;margin-bottom:14px}
    label{font-size:13px;color:var(--muted);margin-bottom:6px}
    input[type="text"],input[type="number"]{padding:10px 12px;border:1px solid #e6eef8;border-radius:8px;font-size:14px}
    .row{display:flex;gap:12px}
    .row .form-group{flex:1}
    .btn{display:inline-block;padding:10px 16px;border-radius:8px;background:var(--accent);color:#fff;text-decoration:none;border:none;cursor:pointer;font-weight:600}
    .helper{font-size:13px;color:var(--muted);margin-top:8px}
    @media (max-width:700px){.row{flex-direction:column}}
  </style>
</head>
<body>
  <main class="container">
    <h1>Add Inventory Item</h1>
    <form action="" method="post" novalidate>
      {% csrf_token %}
      <div class="form-group">
        <label for="item-name">Item name</label>
        <input id="item-name" name="name" type="text" placeholder="e.g. Blue T-shirt" value="{{ initial.name }}" required>
      </div>

      <div class="row">
        <div class="form-group">
          <label for="quantity">Quantity</label>
          <input id="quantity" name="quantity" type="number" min="0" placeholder="0" value="{{ initial.quantity }}" required>
        </div>

        <div class="form-group">
          <label for="price">Price (USD)</label>
          <input id="price" name="price" type="number" min="0" step="0.01" placeholder="0.00" value="{{ initial.price }}" required>
        </div>
      </div>

      <button class="btn" type="submit">Save item</button>
      <p class="helper">Only HTML + CSS — integrate this into your backend as needed.</p>
    </form>
    <div>Submitted: {{ initial.name }} — {{ initial.quantity }} — {{ initial.price }}</div>
  </main>
</body>
</html>
