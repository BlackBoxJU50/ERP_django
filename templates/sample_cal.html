<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sample Calculator</title>
  <style>
    :root{--bg:#f6f8fb;--card:#fff;--accent:#2b6cb0;--muted:#6b7280}
    body{font-family:Inter,system-ui,Arial,Helvetica,sans-serif;background:var(--bg);margin:0;color:#111}
    .wrap{max-width:760px;margin:40px auto;padding:20px}
    .card{background:var(--card);padding:20px;border-radius:12px;box-shadow:0 8px 20px rgba(16,24,40,0.06)}
    h1{margin:0 0 12px;font-size:20px}
    .row{display:flex;gap:12px;margin-bottom:12px}
    input,select{flex:1;padding:10px;border-radius:8px;border:1px solid #e6eef8;font-size:15px}
    button{background:var(--accent);color:#fff;border:none;padding:10px 14px;border-radius:8px;cursor:pointer}
    .result{margin-top:14px;padding:12px;border-radius:8px;background:#f1f5f9;color:#0f172a;font-weight:600}
    .helper{color:var(--muted);font-size:13px;margin-top:8px}
    @media (max-width:700px){.row{flex-direction:column}}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="card">
        <form action="" method="post">
            {% csrf_token %} 
            
            <label for="">Value1</label>
            <input type="text" name="num1" class="form-control">
                <select name="opr" id="">
                    <option value="+">+</option>
                    <option value="-">-</option>
                    <option value="*">*</option>
                    <option value="/">/</option>
                </select>
            <label for="">Value2</label>
            <input type="text" name="num2" class="form-control">
                <button type="submit">
                    Calculate
                </button>
                <label >Output</label>
        </form>
       </div>
  </main>

 
</body>
</html>
